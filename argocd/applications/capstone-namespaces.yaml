apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capstone-namespaces
  namespace: argocd
spec:
  project: capstone

  source:
    repoURL: https://github.com/andrewferdinandus/aks-capstone-gitops.git
    targetRevision: main
    path: platform/namespaces

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
