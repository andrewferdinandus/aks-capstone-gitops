name: Promote store-front image

"on":
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment to promote to"
        required: true
        type: choice
        options:
          - qa
          - prod
      image_tag:
        description: "Existing store-front image tag to promote"
        required: true
        default: "stage13-v1"

permissions:
  contents: write

jobs:
  promote:
    name: Promote store-front image to target environment
    runs-on: ubuntu-latest

    steps:
      - name: "[01] Checkout GitOps repo"
        uses: actions/checkout@v4

      - name: "[02] Validate promotion input"
        run: |
          set -euo pipefail

          TARGET="${{ github.event.inputs.target_environment }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"

          if [ "${TARGET}" != "qa" ] && [ "${TARGET}" != "prod" ]; then
            echo "Invalid target environment: ${TARGET}"
            exit 1
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            echo "image_tag cannot be empty"
            exit 1
          fi

          echo "Target environment: ${TARGET}"
          echo "Image tag: ${IMAGE_TAG}"

      - name: "[03] Update target overlay image tag"
        env:
          TARGET: ${{ github.event.inputs.target_environment }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail

          FILE="apps/capstone-store/overlays/${TARGET}/kustomization.yaml"

          echo "Updating ${FILE}"
          echo "Promoting store-front image tag: ${IMAGE_TAG}"

          python3 -c 'from pathlib import Path; import os, re, sys; p=Path(os.environ["FILE"]); tag=os.environ["IMAGE_TAG"]; text=p.read_text(); new_text,count=re.subn(r"(?m)^(\\s*newTag:\\s*).+$", r"\\1"+tag, text, count=1); sys.exit("No newTag line found in "+str(p)) if count == 0 else p.write_text(new_text); print("Updated", p, "to tag", tag)'

          echo "Updated image section:"
          grep -n -A3 "images:" "${FILE}"

      - name: "[04] Render target overlay with Kustomize"
        run: |
          set -euo pipefail

          TARGET="${{ github.event.inputs.target_environment }}"

          kubectl kustomize "apps/capstone-store/overlays/${TARGET}" > "/tmp/${TARGET}-rendered.yaml"

          echo "Rendered store-front image:"
          grep -n "image: .*store-front" "/tmp/${TARGET}-rendered.yaml"

          echo "Rendered store-front service:"
          grep -n "name: store-front" -A 12 "/tmp/${TARGET}-rendered.yaml" | head -25

      - name: "[05] Commit and push promotion change"
        run: |
          set -euo pipefail

          TARGET="${{ github.event.inputs.target_environment }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          FILE="apps/capstone-store/overlays/${TARGET}/kustomization.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No promotion change to commit. Target already uses image tag ${IMAGE_TAG}."
            exit 0
          fi

          git add "${FILE}"
          git commit -m "Promote store-front ${IMAGE_TAG} to ${TARGET}"
          git push

      - name: "[06] Promotion summary"
        run: |
          {
            echo "# Store-front Promotion Summary"
            echo
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Target environment | ${{ github.event.inputs.target_environment }} |"
            echo "| Image tag | ${{ github.event.inputs.image_tag }} |"
            echo "| Image | store-front:${{ github.event.inputs.image_tag }} |"
            echo "| GitOps overlay | apps/capstone-store/overlays/${{ github.event.inputs.target_environment }} |"
            echo
            echo "Next:"
            echo "1. GitOps validation workflow should run automatically."
            echo "2. Argo CD should sync the target environment."
            echo "3. Verify the target environment workload image and health."
          } >> "$GITHUB_STEP_SUMMARY"
