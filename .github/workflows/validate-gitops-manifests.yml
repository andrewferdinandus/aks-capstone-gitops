name: Validate GitOps manifests

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual validation run"
        required: false
        default: "manual validation"

permissions:
  contents: read

jobs:
  yaml-validation:
    name: YAML Syntax Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4

      - name: Set up Python YAML parser
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate YAML files
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install pyyaml

          python - <<'PY'
          from pathlib import Path
          import yaml

          yaml_files = sorted(
              list(Path(".").rglob("*.yaml")) +
              list(Path(".").rglob("*.yml"))
          )

          yaml_files = [
              path for path in yaml_files
              if ".git" not in path.parts
          ]

          if not yaml_files:
              raise SystemExit("No YAML files found")

          print("YAML files selected for validation:")
          for path in yaml_files:
              print(f" - {path}")

          for path in yaml_files:
              with path.open("r", encoding="utf-8") as f:
                  yaml.safe_load_all(f)
                  list(yaml.safe_load_all(path.open("r", encoding="utf-8")))

          print("YAML syntax validation passed")
          PY

  kustomize-render:
    name: Kustomize Render
    runs-on: ubuntu-latest
    needs:
      - yaml-validation

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render capstone-store Kustomize paths
        run: |
          set -euo pipefail

          printf "%s\n" \
            "apps/capstone-store/base" \
            "apps/capstone-store/overlays/dev" \
            "apps/capstone-store/overlays/qa" \
            "apps/capstone-store/overlays/prod" \
            "apps/capstone-aiops-demo/overlays/dev" \
            "apps/capstone-aiops-dashboard/overlays/dev" \
            "apps/capstone-aiops-detector/overlays/dev" \
            > /tmp/kustomize-paths.txt

          echo "Kustomize paths selected for render:"
          cat /tmp/kustomize-paths.txt

          while read -r path; do
            echo
            echo "========================================"
            echo "Rendering Kustomize path: ${path}"
            echo "========================================"

            output="/tmp/rendered-$(echo "${path}" | tr '/' '-').yaml"

            kubectl kustomize "${path}" > "${output}"

            test -s "${output}"

            echo "Rendered output saved to ${output}"
            echo "Rendered resource count:"
            grep -c '^kind:' "${output}" || true
          done < /tmp/kustomize-paths.txt

  kubeconform-validation:
    name: Kubeconform Kubernetes Validation
    runs-on: ubuntu-latest
    needs:
      - kustomize-render

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        run: |
          set -euo pipefail

          KUBECONFORM_VERSION="0.6.7"

          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            -o /tmp/kubeconform.tar.gz

          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform

          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

          kubeconform -v

      - name: Validate rendered Kubernetes manifests
        run: |
          set -euo pipefail

          printf "%s\n" \
            "apps/capstone-store/base" \
            "apps/capstone-store/overlays/dev" \
            "apps/capstone-store/overlays/qa" \
            "apps/capstone-store/overlays/prod" \
            "apps/capstone-aiops-demo/overlays/dev" \
            "apps/capstone-aiops-dashboard/overlays/dev" \
            "apps/capstone-aiops-detector/overlays/dev" \
            > /tmp/kustomize-paths.txt

          while read -r path; do
            echo
            echo "========================================"
            echo "Validating rendered manifests from: ${path}"
            echo "========================================"

            output="/tmp/rendered-$(echo "${path}" | tr '/' '-').yaml"

            kubectl kustomize "${path}" > "${output}"

            kubeconform \
              -summary \
              -strict \
              -ignore-missing-schemas \
              "${output}"
          done < /tmp/kustomize-paths.txt

  gitops-validation-summary:
    name: GitOps Validation Summary
    runs-on: ubuntu-latest
    needs:
      - yaml-validation
      - kustomize-render
      - kubeconform-validation
    if: always()

    steps:
      - name: Write GitOps validation summary
        run: |
          {
            echo "# GitOps Validation Summary"
            echo
            echo "| Gate | Result | Purpose |"
            echo "|---|---|---|"
            echo "| YAML Syntax Validation | ${{ needs.yaml-validation.result }} | Checks YAML files can be parsed correctly |"
            echo "| Kustomize Render | ${{ needs.kustomize-render.result }} | Confirms base, dev, qa, and prod overlays render successfully |"
            echo "| Kubeconform Kubernetes Validation | ${{ needs.kubeconform-validation.result }} | Validates rendered Kubernetes resources against schemas where available |"
            echo
            echo "This workflow validates GitOps desired state only. It does not deploy directly to AKS."
          } >> "$GITHUB_STEP_SUMMARY"
