name: Validate GitOps manifests

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual validation run"
        required: false
        default: "manual validation"

permissions:
  contents: read

jobs:
  validate:
    name: Validate YAML, Kustomize, and Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4

      - name: Install Python YAML parser
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      - name: Install kubeconform
        run: |
          set -euo pipefail

          KUBECONFORM_VERSION="0.6.7"

          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            -o /tmp/kubeconform.tar.gz

          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

          kubeconform -v

      - name: Validate YAML syntax
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          failed = False

          paths = sorted(Path(".").rglob("*.yaml")) + sorted(Path(".").rglob("*.yml"))

          for path in paths:
              if ".git" in path.parts:
                  continue

              try:
                  with path.open() as f:
                      list(yaml.safe_load_all(f))
                  print(f"OK: {path}")
              except Exception as e:
                  print(f"ERROR: {path}: {e}")
                  failed = True

          if failed:
              sys.exit(1)
          PY

      - name: Render capstone-store base with Kustomize
        run: |
          set -euo pipefail

          kubectl kustomize apps/capstone-store/base > /tmp/capstone-store-base-rendered.yaml

          echo "Rendered manifest preview:"
          head -80 /tmp/capstone-store-base-rendered.yaml

      - name: Validate rendered manifests with kubeconform
        run: |
          set -euo pipefail

          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            /tmp/capstone-store-base-rendered.yaml
