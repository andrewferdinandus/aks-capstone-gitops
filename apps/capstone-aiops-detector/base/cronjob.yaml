apiVersion: batch/v1
kind: CronJob
metadata:
  name: aiops-detector
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: aiops-detector
          restartPolicy: Never
          containers:
            - name: aiops-detector
              image: python:3.12-alpine
              command:
                - python
                - /opt/aiops/detector.py
              env:
                - name: GITHUB_REPO
                  value: andrewferdinandus/aks-capstone-gitops
                - name: GITHUB_BASE_BRANCH
                  value: main
                - name: GITHUB_FIX_BRANCH
                  value: aiops/auto-fix-aiops-demo-service-selector
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aiops-github-token
                      key: token
                      optional: true
                - name: INCIDENT_NAMESPACE
                  value: capstone-aiops-demo
                - name: INCIDENT_SERVICE
                  value: aiops-demo
                - name: INCIDENT_DEPLOYMENT
                  value: aiops-demo
                - name: DASHBOARD_NAMESPACE
                  value: capstone-aiops
                - name: DASHBOARD_CONFIGMAP
                  value: aiops-dashboard-content
              volumeMounts:
                - name: detector-script
                  mountPath: /opt/aiops
                  readOnly: true
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: detector-script
              configMap:
                name: aiops-detector-script
