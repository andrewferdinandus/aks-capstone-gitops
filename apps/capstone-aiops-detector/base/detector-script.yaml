apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-detector-script
data:
  detector.py: |
    #!/usr/bin/env python3

    import base64
    import json
    import os
    import ssl
    import urllib.request
    import urllib.error
    from datetime import datetime, timezone

    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    NAMESPACE_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/namespace"

    KUBE_HOST = os.environ["KUBERNETES_SERVICE_HOST"]
    KUBE_PORT = os.environ["KUBERNETES_SERVICE_PORT"]
    KUBE_API = f"https://{KUBE_HOST}:{KUBE_PORT}"

    GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")
    GITHUB_REPO = os.environ.get("GITHUB_REPO", "andrewferdinandus/aks-capstone-gitops")
    GITHUB_BASE_BRANCH = os.environ.get("GITHUB_BASE_BRANCH", "main")
    GITHUB_FIX_BRANCH = os.environ.get("GITHUB_FIX_BRANCH", "aiops/auto-fix-aiops-demo-service-selector")

    INCIDENT_NAMESPACE = os.environ.get("INCIDENT_NAMESPACE", "capstone-aiops-demo")
    INCIDENT_SERVICE = os.environ.get("INCIDENT_SERVICE", "aiops-demo")
    INCIDENT_DEPLOYMENT = os.environ.get("INCIDENT_DEPLOYMENT", "aiops-demo")

    DASHBOARD_NAMESPACE = os.environ.get("DASHBOARD_NAMESPACE", "capstone-aiops")
    DASHBOARD_CONFIGMAP = os.environ.get("DASHBOARD_CONFIGMAP", "aiops-dashboard-content")

    SERVICE_FILE_PATH = "apps/capstone-aiops-demo/base/service.yaml"
    REPORT_FILE_PATH = "apps/capstone-aiops-dashboard/base/incident-report.json"

    def now_utc():
        return datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")

    def kube_headers():
        token = open(TOKEN_PATH).read().strip()
        return {
            "Authorization": f"Bearer {token}",
            "Accept": "application/json",
            "Content-Type": "application/json",
        }

    def kube_context():
        return ssl.create_default_context(cafile=CA_PATH)

    def kube_get(path):
        req = urllib.request.Request(
            KUBE_API + path,
            headers=kube_headers(),
            method="GET",
        )
        with urllib.request.urlopen(req, context=kube_context()) as response:
            return json.loads(response.read().decode())

    def kube_patch_configmap(namespace, name, data):
        path = f"/api/v1/namespaces/{namespace}/configmaps/{name}"
        payload = json.dumps({
            "data": data
        }).encode()

        req = urllib.request.Request(
            KUBE_API + path,
            data=payload,
            headers={
                **kube_headers(),
                "Content-Type": "application/merge-patch+json",
            },
            method="PATCH",
        )
        with urllib.request.urlopen(req, context=kube_context()) as response:
            return json.loads(response.read().decode())

    def gh_headers():
        return {
            "Authorization": f"Bearer {GITHUB_TOKEN}",
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "Content-Type": "application/json",
        }

    def gh_request(path, method="GET", payload=None, allow_404=False):
        url = f"https://api.github.com/repos/{GITHUB_REPO}{path}"
        data = json.dumps(payload).encode() if payload is not None else None

        req = urllib.request.Request(
            url,
            data=data,
            headers=gh_headers(),
            method=method,
        )

        try:
            with urllib.request.urlopen(req) as response:
                body = response.read().decode()
                return json.loads(body) if body else {}
        except urllib.error.HTTPError as e:
            if allow_404 and e.code == 404:
                return None
            body = e.read().decode()
            print(f"GitHub API error {e.code}: {body}")
            raise

    def get_branch_sha(branch):
        ref = gh_request(f"/git/ref/heads/{branch}")
        return ref["object"]["sha"]

    def ensure_fix_branch():
        base_sha = get_branch_sha(GITHUB_BASE_BRANCH)
        existing = gh_request(f"/git/ref/heads/{GITHUB_FIX_BRANCH}", allow_404=True)

        if existing:
            print(f"Fix branch already exists: {GITHUB_FIX_BRANCH}")
            return

        gh_request(
            "/git/refs",
            method="POST",
            payload={
                "ref": f"refs/heads/{GITHUB_FIX_BRANCH}",
                "sha": base_sha,
            },
        )
        print(f"Created fix branch: {GITHUB_FIX_BRANCH}")

    def get_file(path, branch):
        encoded_path = urllib.parse.quote(path, safe="")
        return gh_request(f"/contents/{encoded_path}?ref={branch}")

    def update_file(path, branch, content, message):
        current = get_file(path, branch)
        encoded = base64.b64encode(content.encode()).decode()

        gh_request(
            f"/contents/{urllib.parse.quote(path, safe='')}",
            method="PUT",
            payload={
                "message": message,
                "content": encoded,
                "sha": current["sha"],
                "branch": branch,
            },
        )

    def open_pr_exists():
        path = f"/pulls?state=open&head={GITHUB_REPO.split('/')[0]}:{GITHUB_FIX_BRANCH}&base={GITHUB_BASE_BRANCH}"
        prs = gh_request(path)
        return prs[0] if prs else None

    def create_pr():
        existing = open_pr_exists()
        if existing:
            print(f"PR already exists: {existing['html_url']}")
            return existing["html_url"]

        pr = gh_request(
            "/pulls",
            method="POST",
            payload={
                "title": "AIOps auto-fix aiops-demo service selector",
                "head": GITHUB_FIX_BRANCH,
                "base": GITHUB_BASE_BRANCH,
                "body": (
                    "## AIOps automated remediation PR\n\n"
                    "AIOps detected that Service `aiops-demo` has no endpoints because "
                    "the Service selector does not match the pod labels.\n\n"
                    "This PR updates the Service selector and incident report. "
                    "The cluster is not directly modified by AIOps. Argo CD will apply "
                    "the fix after human review and merge."
                ),
            },
        )
        print(f"Created PR: {pr['html_url']}")
        return pr["html_url"]

    def build_report(status, severity, selector, labels, endpoints, action, recovery):
        return {
            "incident_id": "aiops-demo-service-no-endpoints-001",
            "status": status,
            "severity": severity,
            "scenario": "Service has no endpoints",
            "summary": (
                "AIOps automatically checked the aiops-demo Service and updated this report."
            ),
            "affected": {
                "namespace": INCIDENT_NAMESPACE,
                "service": INCIDENT_SERVICE,
                "deployment": INCIDENT_DEPLOYMENT,
            },
            "evidence": {
                "service_selector": selector,
                "pod_template_labels": labels,
                "endpoints": endpoints,
            },
            "root_cause": (
                "The Service has no endpoints because the selector does not match the pod labels."
                if status != "Recovered"
                else "The Service selector now matches the pod labels and endpoints are available."
            ),
            "decision": {
                "remediation_type": "GitOps PR",
                "risk": "Low",
                "reason": "Deterministic selector mismatch in an isolated demo namespace.",
            },
            "action": action,
            "recovery": recovery,
            "generated_at": now_utc(),
        }

    def update_dashboard_live(report):
        current_cm = kube_get(f"/api/v1/namespaces/{DASHBOARD_NAMESPACE}/configmaps/{DASHBOARD_CONFIGMAP}")
        index_html = current_cm.get("data", {}).get("index.html", "")

        kube_patch_configmap(
            DASHBOARD_NAMESPACE,
            DASHBOARD_CONFIGMAP,
            {
                "index.html": index_html,
                "incident-report.json": json.dumps(report, indent=2) + "\n",
            },
        )
        print(f"Updated live dashboard ConfigMap: {DASHBOARD_CONFIGMAP}")

    def update_github_pr_files(selector, labels, pr_url):
        ensure_fix_branch()

        service_file = get_file(SERVICE_FILE_PATH, GITHUB_FIX_BRANCH)
        service_text = base64.b64decode(service_file["content"]).decode()

        wrong_app = selector.get("app")
        correct_app = labels.get("app")

        service_text = service_text.replace(
            f"    app: {wrong_app}",
            f"    app: {correct_app}",
            1,
        )

        update_file(
            SERVICE_FILE_PATH,
            GITHUB_FIX_BRANCH,
            service_text,
            "AIOps fix aiops-demo service selector",
        )

        report = build_report(
            status="Remediation PR Created",
            severity="Warning",
            selector=selector,
            labels=labels,
            endpoints="none",
            action={
                "description": "AIOps created a GitOps PR to fix the Service selector.",
                "pr_url": pr_url or "PR creation in progress",
                "human_approved": False,
                "gitops_validation": "Pending",
                "argocd_sync": "Pending",
            },
            recovery={
                "status": "Pending",
                "service_endpoints": "Pending PR merge and Argo CD sync",
            },
        )

        update_file(
            REPORT_FILE_PATH,
            GITHUB_FIX_BRANCH,
            json.dumps(report, indent=2) + "\n",
            "AIOps update dashboard incident report",
        )

    def main():
        print("AIOps detector started")

        svc = kube_get(f"/api/v1/namespaces/{INCIDENT_NAMESPACE}/services/{INCIDENT_SERVICE}")
        deploy = kube_get(f"/apis/apps/v1/namespaces/{INCIDENT_NAMESPACE}/deployments/{INCIDENT_DEPLOYMENT}")
        eps = kube_get(f"/api/v1/namespaces/{INCIDENT_NAMESPACE}/endpoints/{INCIDENT_SERVICE}")

        selector = svc.get("spec", {}).get("selector", {})
        labels = deploy.get("spec", {}).get("template", {}).get("metadata", {}).get("labels", {})
        subsets = eps.get("subsets")

        print(f"Service selector: {selector}")
        print(f"Pod labels: {labels}")
        print(f"Endpoint subsets: {subsets}")

        if subsets:
            report = build_report(
                status="Recovered",
                severity="Info",
                selector=selector,
                labels=labels,
                endpoints=subsets,
                action={
                    "description": "No active remediation required. Service has endpoints.",
                    "pr_url": "n/a",
                    "human_approved": True,
                    "gitops_validation": "Passed or not required",
                    "argocd_sync": "Synced / Healthy",
                },
                recovery={
                    "status": "Recovered",
                    "service_endpoints": "Available",
                },
            )
            update_dashboard_live(report)
            print("Service has endpoints. Dashboard updated as Recovered.")
            return

        if selector.get("app") != labels.get("app"):
            active_report = build_report(
                status="Active Incident Detected",
                severity="Warning",
                selector=selector,
                labels=labels,
                endpoints="none",
                action={
                    "description": "AIOps detected selector mismatch. PR remediation will be attempted.",
                    "pr_url": "Pending",
                    "human_approved": False,
                    "gitops_validation": "Pending",
                    "argocd_sync": "Pending",
                },
                recovery={
                    "status": "Not Recovered",
                    "service_endpoints": "none",
                },
            )

            update_dashboard_live(active_report)

            if not GITHUB_TOKEN:
                print("GITHUB_TOKEN not set. Dashboard updated only. PR not created.")
                return

            pr_url = create_pr()
            update_github_pr_files(selector, labels, pr_url)

            pr_report = active_report
            pr_report["status"] = "Remediation PR Created"
            pr_report["action"]["pr_url"] = pr_url
            update_dashboard_live(pr_report)

            print("AIOps detection and PR remediation completed.")
            return

        print("Endpoints empty but selector appears to match. Reporting only.")
        report = build_report(
            status="Active Incident Detected",
            severity="Warning",
            selector=selector,
            labels=labels,
            endpoints="none",
            action={
                "description": "Endpoints are empty, but selector appears to match. Manual investigation required.",
                "pr_url": "n/a",
                "human_approved": False,
                "gitops_validation": "n/a",
                "argocd_sync": "n/a",
            },
            recovery={
                "status": "Not Recovered",
                "service_endpoints": "none",
            },
        )
        update_dashboard_live(report)

    if __name__ == "__main__":
        main()
