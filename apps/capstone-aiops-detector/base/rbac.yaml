apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-detector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-detector-read-runtime-evidence
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-detector-read-runtime-evidence
subjects:
  - kind: ServiceAccount
    name: aiops-detector
    namespace: capstone-aiops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aiops-detector-read-runtime-evidence
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-detector-update-dashboard
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["aiops-dashboard-content"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-detector-update-dashboard
subjects:
  - kind: ServiceAccount
    name: aiops-detector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-detector-update-dashboard
