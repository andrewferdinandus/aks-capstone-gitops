apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-detector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-detector-read-demo
  namespace: capstone-aiops-demo
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-detector-read-demo
  namespace: capstone-aiops-demo
subjects:
  - kind: ServiceAccount
    name: aiops-detector
    namespace: capstone-aiops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-detector-read-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-detector-update-dashboard
  namespace: capstone-aiops
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-detector-update-dashboard
  namespace: capstone-aiops
subjects:
  - kind: ServiceAccount
    name: aiops-detector
    namespace: capstone-aiops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-detector-update-dashboard
