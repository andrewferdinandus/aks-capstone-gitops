server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /prometheus/ {
    proxy_pass http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/;
  }

  location /alertmanager/ {
    proxy_pass http://monitoring-kube-prometheus-alertmanager.monitoring.svc.cluster.local:9093/;
  }
}
