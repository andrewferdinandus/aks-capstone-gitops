apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-dashboard
  template:
    metadata:
      labels:
        app: aiops-dashboard
    spec:
      containers:
        - name: aiops-dashboard
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: dashboard-content
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: dashboard-content
          configMap:
            name: aiops-dashboard-content
